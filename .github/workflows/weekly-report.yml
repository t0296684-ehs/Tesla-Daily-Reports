name: Weekly Tesla Report

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "⚡ Tesla Weekly Digest"
          to: ${{ secrets.EMAIL_TO }}
          from: Jason's Daily Digest
          html_body: |
            <h2>⚡ Tesla 本週精華已更新</h2>
            <a href="https://t0296684-ehs.github.io/Tesla-Daily-Reports/" style="padding:12px 24px;background:#DC2626;color:#fff;text-decoration:none;border-radius:8px;display:inline-block">打開日報</a>
